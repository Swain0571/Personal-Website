<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页 + Coze AI 智能体</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:"Microsoft Yahei",sans-serif;
            background:#f5f7fa;
            text-align:center;
            padding:60px 20px;
        }
        .card{
            max-width:600px;
            margin:0 auto;
            background:#fff;
            padding:40px;
            border-radius:16px;
            box-shadow:0 4px 20px #00000015;
        }
        h1{color:#222;margin-bottom:20px;}
        p{color:#666;font-size:16px;line-height:1.8;}
    </style>
</head>
<body>
    <div class="card">
        <h1>我的个人简介主页</h1>
        <p>欢迎访问我的个人网站<br>你可以随时与下方 AI 智能体对话交流</p>
    </div>

    <!-- 这里换成你自己 Coze 发布的 iframe 嵌入地址 -->
    <iframe 
        src="你的Coze公开链接地址"
        style="position:fixed;right:20px;bottom:20px;width:380px;height:600px;border:none;border-radius:12px;box-shadow:0 4px 30px #0003;"
    ></iframe>
</body>
</html>
